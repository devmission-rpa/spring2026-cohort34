    <!-- Full screen modal/For on click for ProfileCard -->
    <div id="detail-view" class="modal">
        <div class="modal-content">
            <span class="close-x" onclick="closeDetail()">&times;</span>
            <div class="modal-layout">
                <div class="profile-col">

                </div>
                <div class="info-col">
                    <div class="nameIcons">

                            </a>
                        </div>
                    </div>
                    <p id="modal-dream" class="subtitle">Dream Job</p>
                    <div class="info-grid">
                        <div class="info-box"><label>FAVORITE TECH</label><span id="f-tech">---</span></div>
                        <div class="info-box"><label>HOBBIES</label><span id="f-hobbies">---</span></div>
                        <div class="info-box" style="grid-column: span 2;"><label>ABOUT ME</label><span
                                id="f-about">---</span></div>
                    </div>
                </div>
            </div>
            <div class="projects-section">

                        <div class="btn-img" id="img-webapp"></div>
                        <span>Web App</span>
                    </a>

                </div>
            </div>
